<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam Score Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080910;
      --surface:  #10131f;
      --card:     #141928;
      --border:   #1e2538;
      --text:     #e2e8f0;
      --muted:    #64748b;
      --dim:      #334155;

      --english:  #3b82f6;
      --biology:  #22c55e;
      --gat:      #a855f7;
      --chemistry:#f59e0b;
      --physics:  #6366f1;
      --combined: #818cf8;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-80px);
      padding: 10px 28px; border-radius: 99px;
      font-weight: 800; font-size: 17px; letter-spacing: 0.5px;
      z-index: 9999; transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.25s;
      opacity: 0; pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 32px #0008;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
    .header-score { font-size: 13px; color: var(--muted); }
    .header-score span { color: var(--combined); font-weight: 700; font-size: 15px; }

    /* ── NAV ── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; overflow-x: auto; gap: 0;
      scrollbar-width: none;
    }
    nav::-webkit-scrollbar { display: none; }
    .nav-tab {
      flex: 0 0 auto; padding: 12px 20px;
      font-size: 13px; font-weight: 600;
      color: var(--muted); border: none;
      background: transparent; cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .nav-tab.active { color: var(--text); border-bottom-color: var(--active-color, #6366f1); }
    .nav-tab-inner { display: flex; align-items: center; gap: 6px; }
    .nav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--active-color, #6366f1); opacity: 0.5; }
    .nav-tab.active .nav-dot { opacity: 1; }

    /* ── MAIN ── */
    main { max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── PAGES ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── OVERVIEW ── */
    .hero-card {
      background: linear-gradient(135deg, #1a1040 0%, #0d1117 60%, #0c1424 100%);
      border: 1px solid #312e8155;
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .hero-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, #6366f118 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--combined); text-transform: uppercase; }
    .hero-score { font-size: 72px; font-weight: 900; color: #c7d2fe; line-height: 1; margin: 8px 0 4px; }
    .hero-max { font-size: 15px; color: var(--dim); }
    .hero-max span { color: #6366f1; }
    .progress-bar-wrap { background: #0f172a; border-radius: 99px; height: 8px; overflow: hidden; margin-top: 18px; }
    .progress-bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

    .subject-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    @media (max-width: 480px) { .subject-cards { grid-template-columns: 1fr; } }

    .subject-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
    }
    .subject-card:hover { transform: translateY(-2px); }
    .subject-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .subject-card-info { display: flex; align-items: center; gap: 10px; }
    .subject-emoji { font-size: 22px; }
    .subject-name { font-size: 14px; font-weight: 700; }
    .subject-qcount { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .subject-score-big { font-size: 28px; font-weight: 900; line-height: 1; }
    .subject-score-max { font-size: 10px; color: var(--muted); }
    .dual-bars { display: flex; flex-direction: column; gap: 4px; }
    .bar-row { display: flex; align-items: center; gap: 6px; }
    .bar-label { font-size: 9px; color: var(--muted); width: 44px; }
    .bar-track { flex: 1; background: var(--border); border-radius: 99px; height: 4px; overflow: hidden; }
    .bar-pct { font-size: 9px; color: var(--muted); width: 26px; text-align: right; }
    .chip-row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    .chip { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 99px; }

    /* accuracy table */
    .accuracy-table { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
    .accuracy-table-head { display: grid; grid-template-columns: 1fr 80px 80px 80px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .accuracy-table-head span { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .accuracy-table-head span:not(:first-child) { text-align: right; }
    .accuracy-row { display: grid; grid-template-columns: 1fr 80px 80px 80px; padding: 11px 16px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s; cursor: pointer; }
    .accuracy-row:last-child { border-bottom: none; }
    .accuracy-row:hover { background: var(--border); }
    .accuracy-row span { font-size: 13px; }
    .accuracy-row span:not(:first-child) { text-align: right; font-weight: 600; }
    .accuracy-subject { display: flex; align-items: center; gap: 8px; font-weight: 600; }

    .reset-all-btn {
      width: 100%; background: var(--card);
      border: 1px solid #ef444430; color: #ef4444;
      border-radius: 12px; padding: 13px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: background 0.15s;
    }
    .reset-all-btn:hover { background: #ef444412; }

    /* ── SUBJECT PAGE ── */
    .subj-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .subj-title { display: flex; align-items: center; gap: 12px; }
    .subj-emoji-big { font-size: 32px; }
    .subj-name-big { font-size: 22px; font-weight: 900; }
    .subj-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .subj-score-display { text-align: right; }
    .subj-score-num { font-size: 44px; font-weight: 900; line-height: 1; }
    .subj-score-denom { font-size: 13px; color: var(--muted); }

    .main-progress { margin-bottom: 24px; }
    .main-progress-track { background: var(--border); border-radius: 99px; height: 10px; overflow: hidden; }
    .main-progress-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); margin-top: 5px; }

    .flash-strip { height: 4px; border-radius: 99px; margin-bottom: 20px; transition: background 0.15s; background: var(--border); }

    /* Input buttons */
    .input-section { margin-bottom: 20px; }
    .input-section-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .answer-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .answer-btn {
      border: 2px solid; border-radius: 14px;
      padding: 16px 8px; cursor: pointer; text-align: center;
      transition: transform 0.1s, box-shadow 0.15s;
      background: transparent;
    }
    .answer-btn:hover { transform: translateY(-2px); }
    .answer-btn:active { transform: scale(0.96); }
    .answer-btn-label { font-size: 14px; font-weight: 800; }
    .answer-btn-sub { font-size: 11px; margin-top: 3px; opacity: 0.7; }

    .done-banner {
      text-align: center; padding: 20px;
      border-radius: 14px; margin-bottom: 20px;
      font-size: 16px; font-weight: 700;
    }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .stat-card { background: var(--card); border-radius: 14px; padding: 14px 16px; border-left: 3px solid; }
    .stat-label { font-size: 11px; color: var(--muted); }
    .stat-value { font-size: 26px; font-weight: 900; margin-top: 2px; }

    /* Log */
    .log-section { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 16px; }
    .log-title { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
    .log-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .log-dot {
      width: 24px; height: 24px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; border: 1px solid;
      cursor: default;
    }

    /* Actions */
    .action-row { display: flex; gap: 8px; }
    .action-btn {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      color: var(--muted); border-radius: 10px; padding: 11px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .action-btn:hover { background: var(--border); }
    .action-btn.danger { border-color: #ef444430; color: #ef4444; }
    .action-btn.danger:hover { background: #ef444415; }
    .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="toast"></div>

<header>
  <div>
    <div class="header-title">📊 Exam Tracker</div>
    <div class="header-score">Combined: <span id="header-combined">0</span> / 1250</div>
  </div>
  <div style="text-align:right">
    <div style="font-size:11px;color:var(--muted)" id="header-progress">0/250 questions</div>
  </div>
</header>

<nav id="nav"></nav>

<main>
  <!-- OVERVIEW PAGE -->
  <div class="page active" id="page-overview">
    <div class="hero-card">
      <div class="hero-label">Combined Score</div>
      <div class="hero-score" id="ov-combined">0</div>
      <div class="hero-max"><span id="ov-combined2">0</span> / 1250</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="ov-bar" style="width:0%;background:linear-gradient(90deg,#6366f1,#818cf8)"></div>
      </div>
      <div style="font-size:11px;color:var(--dim);margin-top:6px" id="ov-q-label">0 of 250 questions attempted</div>
    </div>

    <div class="subject-cards" id="subject-cards"></div>

    <div class="accuracy-table">
      <div class="accuracy-table-head">
        <span>Subject</span>
        <span>Score</span>
        <span>Accuracy</span>
        <span>Done</span>
      </div>
      <div id="accuracy-rows"></div>
    </div>

    <button class="reset-all-btn" onclick="resetAll()">🗑 Reset All Subjects</button>
  </div>

  <!-- SUBJECT PAGES (generated) -->
  <div id="subject-pages"></div>
</main>

<script>
const SUBJECTS = [
  { id:'english',   label:'English',   emoji:'📝', color:'#3b82f6' },
  { id:'biology',   label:'Biology',   emoji:'🧬', color:'#22c55e' },
  { id:'gat',       label:'GAT',       emoji:'🧠', color:'#a855f7' },
  { id:'chemistry', label:'Chemistry', emoji:'⚗️', color:'#f59e0b' },
  { id:'physics',   label:'Physics',   emoji:'⚛️', color:'#6366f1' },
];
const TOTAL_Q = 50, MAX_SCORE = 250;
const STORAGE_KEY = 'exam-tracker-html-v1';

// ── State ──
let state = {};
SUBJECTS.forEach(s => state[s.id] = []);

function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { const d = JSON.parse(saved); SUBJECTS.forEach(s => { if (d[s.id]) state[s.id] = d[s.id]; }); }
  } catch {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

function calc(answers) {
  const correct    = answers.filter(a=>a===1).length;
  const wrong      = answers.filter(a=>a===2).length;
  const unanswered = answers.filter(a=>a===3).length;
  const attempted  = correct + wrong;
  const score      = correct*5 + wrong*(-1);
  const accuracy   = attempted ? Math.round(correct/attempted*100) : null;
  return { correct, wrong, unanswered, attempted, score, accuracy };
}

// ── Toast ──
let toastTimer;
function showToast(msg, color) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = color;
  el.style.color = '#fff';
  el.style.boxShadow = `0 8px 32px ${color}66`;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

// ── Current page ──
let currentPage = 'overview';

function goTo(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.page === id);
  });
  currentPage = id;
  if (id !== 'overview') renderSubjectPage(id);
  else renderOverview();
  window.scrollTo(0, 0);
}

// ── NAV ──
function buildNav() {
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  // Overview tab
  const ov = document.createElement('button');
  ov.className = 'nav-tab active';
  ov.dataset.page = 'overview';
  ov.style.setProperty('--active-color', '#818cf8');
  ov.innerHTML = `<div class="nav-tab-inner"><span class="nav-dot"></span> Overview</div>`;
  ov.onclick = () => goTo('overview');
  nav.appendChild(ov);

  SUBJECTS.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab';
    btn.dataset.page = s.id;
    btn.style.setProperty('--active-color', s.color);
    btn.innerHTML = `<div class="nav-tab-inner"><span class="nav-dot" style="background:${s.color}"></span> ${s.emoji} ${s.label}</div>`;
    btn.onclick = () => goTo(s.id);
    nav.appendChild(btn);
  });
}

// ── SUBJECT PAGES ──
function buildSubjectPages() {
  const container = document.getElementById('subject-pages');
  SUBJECTS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'page';
    div.id = 'page-' + s.id;
    div.innerHTML = `
      <div class="subj-header">
        <div class="subj-title">
          <div class="subj-emoji-big">${s.emoji}</div>
          <div>
            <div class="subj-name-big">${s.label}</div>
            <div class="subj-subtitle" id="${s.id}-subtitle">Q 0/${TOTAL_Q} · ${TOTAL_Q} left</div>
          </div>
        </div>
        <div class="subj-score-display">
          <div class="subj-score-num" id="${s.id}-score-big" style="color:${s.color}">0</div>
          <div class="subj-score-denom">/ ${MAX_SCORE}</div>
        </div>
      </div>

      <div class="main-progress">
        <div class="main-progress-track">
          <div class="progress-bar-fill" id="${s.id}-prog" style="width:0%;background:${s.color}"></div>
        </div>
        <div class="main-progress-labels">
          <span>Q1</span><span id="${s.id}-prog-label">0 / ${TOTAL_Q}</span><span>Q${TOTAL_Q}</span>
        </div>
      </div>

      <div class="flash-strip" id="${s.id}-flash"></div>

      <div class="input-section" id="${s.id}-input-section">
        <div class="input-section-label">Log Answer for Next Question</div>
        <div class="answer-btns">
          <button class="answer-btn" style="border-color:#22c55e44;color:#22c55e;background:#22c55e0e"
            onclick="addAnswer('${s.id}',1)">
            <div class="answer-btn-label">✓ Correct</div>
            <div class="answer-btn-sub">+5 pts</div>
          </button>
          <button class="answer-btn" style="border-color:#ef444444;color:#ef4444;background:#ef44440e"
            onclick="addAnswer('${s.id}',2)">
            <div class="answer-btn-label">✗ Wrong</div>
            <div class="answer-btn-sub">−1 pt</div>
          </button>
          <button class="answer-btn" style="border-color:#f59e0b44;color:#f59e0b;background:#f59e0b0e"
            onclick="addAnswer('${s.id}',3)">
            <div class="answer-btn-label">— Skip</div>
            <div class="answer-btn-sub">0 pts</div>
          </button>
        </div>
      </div>

      <div class="done-banner" id="${s.id}-done-banner" style="display:none;background:${s.color}18;border:1px solid ${s.color}44;color:${s.color}">
        🎉 All 50 questions completed!
      </div>

      <div class="stats-grid">
        <div class="stat-card" style="border-color:#22c55e">
          <div class="stat-label">Correct</div>
          <div class="stat-value" id="${s.id}-stat-correct" style="color:#22c55e">0</div>
        </div>
        <div class="stat-card" style="border-color:#ef4444">
          <div class="stat-label">Wrong</div>
          <div class="stat-value" id="${s.id}-stat-wrong" style="color:#ef4444">0</div>
        </div>
        <div class="stat-card" style="border-color:#f59e0b">
          <div class="stat-label">Skipped</div>
          <div class="stat-value" id="${s.id}-stat-skip" style="color:#f59e0b">0</div>
        </div>
        <div class="stat-card" style="border-color:${s.color}">
          <div class="stat-label">Accuracy</div>
          <div class="stat-value" id="${s.id}-stat-acc" style="color:${s.color}">—</div>
        </div>
      </div>

      <div class="log-section" id="${s.id}-log" style="display:none">
        <div class="log-title">Answer Log</div>
        <div class="log-grid" id="${s.id}-log-grid"></div>
      </div>

      <div class="action-row">
        <button class="action-btn" id="${s.id}-undo" onclick="undoAnswer('${s.id}')" disabled>↩ Undo</button>
        <button class="action-btn danger" onclick="resetSubject('${s.id}')">Reset ${s.label}</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// ── Flash strip ──
const flashTimers = {};
function doFlash(sid, code) {
  const el = document.getElementById(sid + '-flash');
  if (!el) return;
  const colors = { 1: '#22c55e', 2: '#ef4444', 3: '#f59e0b' };
  el.style.background = colors[code];
  clearTimeout(flashTimers[sid]);
  flashTimers[sid] = setTimeout(() => { el.style.background = 'var(--border)'; }, 700);
}

// ── Add / Undo / Reset ──
function addAnswer(sid, code) {
  if (state[sid].length >= TOTAL_Q) return;
  state[sid].push(code);
  save();
  doFlash(sid, code);
  const msgs = { 1: '+5 ✓', 2: '−1 ✗', 3: 'Skipped' };
  const cols = { 1: '#22c55e', 2: '#ef4444', 3: '#f59e0b' };
  showToast(msgs[code], cols[code]);
  renderSubjectPage(sid);
  updateHeader();
}

function undoAnswer(sid) {
  if (!state[sid].length) return;
  state[sid].pop();
  save();
  renderSubjectPage(sid);
  updateHeader();
}

function resetSubject(sid) {
  const s = SUBJECTS.find(x => x.id === sid);
  if (!confirm(`Reset all ${s.label} answers?`)) return;
  state[sid] = [];
  save();
  renderSubjectPage(sid);
  updateHeader();
  if (currentPage === 'overview') renderOverview();
}

function resetAll() {
  if (!confirm('Reset ALL subjects? This cannot be undone.')) return;
  SUBJECTS.forEach(s => state[s.id] = []);
  save();
  SUBJECTS.forEach(s => renderSubjectPage(s.id));
  updateHeader();
  renderOverview();
}

// ── Render subject page ──
function renderSubjectPage(sid) {
  const s = SUBJECTS.find(x => x.id === sid);
  const answers = state[sid];
  const st = calc(answers);
  const done = answers.length >= TOTAL_Q;
  const remaining = TOTAL_Q - answers.length;
  const pct = answers.length / TOTAL_Q * 100;

  setText(sid+'-subtitle', `Q ${answers.length}/${TOTAL_Q} · ${remaining} left`);
  setText(sid+'-score-big', st.score);
  setStyle(sid+'-prog', 'width', pct.toFixed(1)+'%');
  setText(sid+'-prog-label', `${answers.length} / ${TOTAL_Q}`);

  setText(sid+'-stat-correct', st.correct);
  setText(sid+'-stat-wrong', st.wrong);
  setText(sid+'-stat-skip', st.unanswered);
  setText(sid+'-stat-acc', st.accuracy !== null ? st.accuracy+'%' : '—');

  const inputSec = document.getElementById(sid+'-input-section');
  const doneBanner = document.getElementById(sid+'-done-banner');
  if (inputSec) inputSec.style.display = done ? 'none' : 'block';
  if (doneBanner) doneBanner.style.display = done ? 'block' : 'none';

  const undoBtn = document.getElementById(sid+'-undo');
  if (undoBtn) undoBtn.disabled = answers.length === 0;

  // Log
  const logSection = document.getElementById(sid+'-log');
  const logGrid = document.getElementById(sid+'-log-grid');
  if (logSection && logGrid) {
    logSection.style.display = answers.length > 0 ? 'block' : 'none';
    logGrid.innerHTML = answers.map((a, i) => {
      const c = a===1?'#22c55e':a===2?'#ef4444':'#f59e0b';
      const sym = a===1?'✓':a===2?'✗':'—';
      return `<div class="log-dot" title="Q${i+1}" style="background:${c}18;border-color:${c}44;color:${c}">${sym}</div>`;
    }).join('');
  }
}

// ── Render overview ──
function renderOverview() {
  const totalScore = SUBJECTS.reduce((s, sub) => s + calc(state[sub.id]).score, 0);
  const totalQ = SUBJECTS.reduce((s, sub) => s + state[sub.id].length, 0);
  const totalMax = SUBJECTS.length * MAX_SCORE;
  const totalAllQ = SUBJECTS.length * TOTAL_Q;

  setText('ov-combined', totalScore);
  setText('ov-combined2', totalScore);
  setStyle('ov-bar', 'width', Math.max(0, totalScore/totalMax*100).toFixed(1)+'%');
  setText('ov-q-label', `${totalQ} of ${totalAllQ} questions attempted`);

  // Subject cards
  const cardsEl = document.getElementById('subject-cards');
  cardsEl.innerHTML = SUBJECTS.map(s => {
    const ans = state[s.id];
    const st = calc(ans);
    const pct = ans.length / TOTAL_Q * 100;
    const scorePct = Math.max(0, st.score) / MAX_SCORE * 100;
    return `
    <div class="subject-card" style="border-color:${s.color}22" onclick="goTo('${s.id}')">
      <div class="subject-card-top">
        <div class="subject-card-info">
          <div class="subject-emoji">${s.emoji}</div>
          <div>
            <div class="subject-name">${s.label}</div>
            <div class="subject-qcount">${ans.length}/${TOTAL_Q} questions</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="subject-score-big" style="color:${s.color}">${st.score}</div>
          <div class="subject-score-max">/${MAX_SCORE}</div>
        </div>
      </div>
      <div class="dual-bars">
        <div class="bar-row">
          <div class="bar-label">Progress</div>
          <div class="bar-track"><div class="progress-bar-fill" style="width:${pct.toFixed(1)}%;background:${s.color}88"></div></div>
          <div class="bar-pct">${Math.round(pct)}%</div>
        </div>
        <div class="bar-row">
          <div class="bar-label">Score</div>
          <div class="bar-track"><div class="progress-bar-fill" style="width:${scorePct.toFixed(1)}%;background:${s.color}"></div></div>
          <div class="bar-pct">${Math.round(scorePct)}%</div>
        </div>
      </div>
      <div class="chip-row">
        <div class="chip" style="background:#22c55e18;color:#22c55e">✓ ${st.correct}</div>
        <div class="chip" style="background:#ef444418;color:#ef4444">✗ ${st.wrong}</div>
        <div class="chip" style="background:#f59e0b18;color:#f59e0b">— ${st.unanswered}</div>
        ${st.accuracy!==null?`<div class="chip" style="background:${s.color}18;color:${s.color}">${st.accuracy}% acc</div>`:''}
      </div>
    </div>`;
  }).join('');

  // Accuracy rows
  const accEl = document.getElementById('accuracy-rows');
  accEl.innerHTML = SUBJECTS.map(s => {
    const st = calc(state[s.id]);
    return `
    <div class="accuracy-row" onclick="goTo('${s.id}')">
      <div class="accuracy-subject"><span>${s.emoji}</span> ${s.label}</div>
      <span style="color:${s.color}">${st.score}</span>
      <span style="color:${st.accuracy!==null?s.color:'var(--dim)'}">${st.accuracy!==null?st.accuracy+'%':'—'}</span>
      <span style="color:var(--muted)">${state[s.id].length}/${TOTAL_Q}</span>
    </div>`;
  }).join('');
}

// ── Header ──
function updateHeader() {
  const total = SUBJECTS.reduce((s, sub) => s + calc(state[sub.id]).score, 0);
  const totalQ = SUBJECTS.reduce((s, sub) => s + state[sub.id].length, 0);
  setText('header-combined', total);
  setText('header-progress', `${totalQ}/250 questions`);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (currentPage === 'overview') return;
  if (['1','2','3'].includes(e.key) && !e.ctrlKey && !e.metaKey && !e.altKey) {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    addAnswer(currentPage, parseInt(e.key));
  }
});

// ── Helpers ──
function setText(id, val) { const el=document.getElementById(id); if(el) el.textContent=val; }
function setStyle(id, prop, val) { const el=document.getElementById(id); if(el) el.style[prop]=val; }

// ── Init ──
load();
buildNav();
buildSubjectPages();
SUBJECTS.forEach(s => renderSubjectPage(s.id));
renderOverview();
updateHeader();
</script>
</body>
</html>
